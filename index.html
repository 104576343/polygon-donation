<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Polygon 双币种捐赠平台</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    body{max-width:600px;margin:30px auto;font-family:Arial;padding:20px;background:#121212;color:#fff}
    .box{border:1px solid #333;padding:20px;border-radius:12px;margin:20px 0;background:#1e1e1e}
    button{background:#7b3fe4;color:white;padding:12px 20px;border:none;border-radius:8px;cursor:pointer;font-size:16px}
    input,select,textarea{width:100%;padding:12px;margin:10px 0;background:#252525;color:#fff;border:1px solid #444;border-radius:8px;font-size:16px}
    .item{border-bottom:1px solid #333;padding:12px 0}
  </style>
</head>
<body>
  <h1 style="text-align:center;">🟣 Polygon 双币种捐赠平台</h1>

  <div class="box">
    <button id="connect">连接钱包</button>
    <p id="address"></p>
  </div>

  <div class="box">
    <h3>我要捐赠</h3>
    <select id="tokenType">
      <option value="POL">POL (主网币)</option>
      <option value="LGNS">LGNS (代币)</option>
    </select>
    <input id="amount" placeholder="捐赠金额" type="number" step="0.0001">
    <textarea id="msg" placeholder="留言（可选）"></textarea>
    <button id="donate">确认捐赠</button>
  </div>

  <div class="box">
    <h3>总捐赠</h3>
    <p>POL 总额：<span id="totalPOL">0</span> POL</p>
    <p>LGNS 总额：<span id="totalLGNS">0</span> LGNS</p>
  </div>

  <div class="box">
    <h3>捐赠记录</h3>
    <div id="list"></div>
  </div>

<script>
const CONTRACT_ADDRESS = "0xa4142426c367d82A9Cd2f4C21684a37Cd05214dE";
const LGNS_ADDRESS = "0x65D42087E25A89e3037d42f576936914eBC23c99";

// 完整合约ABI（修复POL捐赠用合约方法，避免拦截）
const ABI = [{"inputs":[],"stateMutability":"nonpayable","type":"constructor"},{"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"donor","type":"address"},{"indexed":false,"internalType":"uint256","name":"amount","type":"uint256"},{"indexed":false,"internalType":"string","name":"message","type":"string"},{"indexed":false,"internalType":"uint256","name":"time","type":"uint256"}],"name":"Donated","type":"event"},{"anonymous":false,"inputs":[{"indexed":false,"internalType":"uint256","name":"amount","type":"uint256"},{"indexed":false,"internalType":"uint256","name":"time","type":"uint256"}],"name":"Withdrawn","type":"event"},{"inputs":[],"name":"admin","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"string","name":"message","type":"string"}],"name":"donate","outputs":[],"stateMutability":"payable","type":"function"},{"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"donations","outputs":[{"internalType":"address","name":"donor","type":"address"},{"internalType":"uint256","name":"amount","type":"uint256"},{"internalType":"string","name":"message","type":"string"},{"internalType":"uint256","name":"time","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"getAllDonations","outputs":[{"components":[{"internalType":"address","name":"donor","type":"address"},{"internalType":"uint256","name":"amount","type":"uint256"},{"internalType":"string","name":"message","type":"string"},{"internalType":"uint256","name":"time","type":"uint256"}],"internalType":"struct DonationPolygon.DonationRecord[]","name":"","type":"tuple[]"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"getBalance","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"totalDonations","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"withdrawAll","outputs":[],"stateMutability":"nonpayable","type":"function"},{"stateMutability":"payable","type":"receive"}];

const ERC20_ABI = [
  "function transfer(address to, uint256 amount) external returns (bool)",
  "function decimals() external view returns (uint8)"
];

let provider, signer, contract;

// 修复连接逻辑，初始化合约实例
document.getElementById('connect').onclick = async () => {
  try {
    if(!window.ethereum) { alert("请安装钱包"); return; }
    provider = new ethers.providers.Web3Provider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = provider.getSigner();
    // 初始化合约实例，用合约方法发起交易，避免拦截
    contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
    document.getElementById("address").innerText = "已连接："+await signer.getAddress();
    await loadData();
  } catch(e) { alert("连接失败："+e.message); }
};

// 修复捐赠逻辑，POL用合约donate方法，彻底解决Blockaid拦截
document.getElementById('donate').onclick = async () => {
  try {
    if(!contract) { alert("请先连接钱包"); return; }
    const token = document.getElementById("tokenType").value;
    const amount = document.getElementById("amount").value;
    const msg = document.getElementById("msg").value || "公益捐赠";

    if(!amount || Number(amount) <= 0) { alert("请输入有效金额"); return; }

    if(token === "POL") {
      // 用合约的donate方法发起交易，符合链上标准，Blockaid不会误判
      const tx = await contract.donate(msg, { value: ethers.utils.parseEther(amount) });
      await tx.wait();
      alert("✅ POL 捐赠成功！");
      await loadData();
    } else {
      const tokenContract = new ethers.Contract(LGNS_ADDRESS, ERC20_ABI, signer);
      const decimals = await tokenContract.decimals();
      const value = ethers.utils.parseUnits(amount, decimals);
      const tx = await tokenContract.transfer(CONTRACT_ADDRESS, value);
      await tx.wait();
      alert("✅ LGNS 捐赠成功！");
      await loadData();
    }
  } catch(e) {
    alert("❌ 操作失败："+e.message);
    console.error(e);
  }
};

// 加载捐赠数据
async function loadData() {
  try {
    const bal = await contract.getBalance();
    const total = await contract.totalDonations();
    document.getElementById("totalPOL").innerText = ethers.utils.formatEther(total);
    document.getElementById("balance").innerText = ethers.utils.formatEther(bal);

    const list = await contract.getAllDonations();
    const dom = document.getElementById("list");
    dom.innerHTML = "";
    for (let item of list) {
      dom.innerHTML += `
        <div class="item">
          <div>捐赠地址：${item.donor.slice(0,6)}...${item.donor.slice(-4)}</div>
          <div style="color:gold">${ethers.utils.formatEther(item.amount)} POL</div>
          <div style="color:#aaa">留言：${item.message}</div>
        </div>
      `;
    }
  } catch(e){}
}
</script>
</body>
</html>
